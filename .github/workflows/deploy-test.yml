name: Deploy to Test S3

on:
  push:
    branches: [ test ]

jobs:
  deploy-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Deploy to S3 Test Bucket
      run: |
        aws s3 sync dist/ s3://app-lts-test/ --delete --cache-control "public, max-age=3600"
        echo "✅ Deployed to: https://app-lts-test.s3.amazonaws.com"

    - name: Invalidate CloudFront (if configured)
      run: |
        if [ ! -z "${{ secrets.CLOUDFRONT_DISTRIBUTION_TEST }}" ]; then
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_TEST }} --paths "/*"
          echo "✅ CloudFront cache invalidated"
        fi
      continue-on-error: true

    - name: Post deployment message
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.repos.createCommitComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: context.sha,
            body: '✅ Test deployment successful!\n\n📍 Test URL: https://app-lts-test.s3.amazonaws.com\n\nReady for QA testing.'
          })
