name: Deploy to Production S3

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger for emergency deployments

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval in GitHub

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Verify build artifacts
      run: |
        if [ ! -d "dist" ]; then
          echo "❌ Build failed: dist/ directory not found"
          exit 1
        fi
        echo "✅ Build artifacts verified"
        ls -lh dist/ | head -10

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Deploy to S3 Production Bucket
      run: |
        echo "🚀 Starting production deployment..."
        aws s3 sync dist/ s3://app-lts-prod/ --delete --cache-control "public, max-age=3600"
        echo "✅ Successfully deployed to production!"
        echo "📍 Production URL: https://app-lts-prod.s3.amazonaws.com"

    - name: Invalidate CloudFront (if configured)
      run: |
        if [ ! -z "${{ secrets.CLOUDFRONT_DISTRIBUTION_PROD }}" ]; then
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_PROD }} --paths "/*"
          echo "✅ CloudFront cache invalidated"
        fi
      continue-on-error: true

    - name: Slack Notification (optional)
      uses: slackapi/slack-github-action@v1
      if: always()
      with:
        payload: |
          {
            "text": "${{ job.status == 'success' && '✅ Production Deployment Successful!' || '❌ Production Deployment Failed' }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Production Deployment*\n${{ job.status == 'success' && '✅ Successful' || '❌ Failed' }}\n*URL:* https://app-lts-prod.s3.amazonaws.com\n*Commit:* ${{ github.sha }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      continue-on-error: true

    - name: Post deployment summary
      uses: actions/github-script@v7
      if: always()
      with:
        script: |
          const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
          github.rest.repos.createCommitComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: context.sha,
            body: `${status} Production deployment ${{ job.status }}!\n\n📍 Production URL: https://app-lts-prod.s3.amazonaws.com`
          })
